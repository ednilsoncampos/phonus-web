                "summary": "Listar produtos",
                "description": "Filtros opcionais: categoria, apenas ativos (padrão true), abaixo do estoque mínimo, busca por nome (parcial, case-insensitive). Quando busca é informada, abaixoDoMinimo é ignorado.",
